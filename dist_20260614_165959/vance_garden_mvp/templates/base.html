<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VANCE // Performance Concierge</title>
    <style>
        body {
            background: #151515;
            color: #f5f5f5;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .shell {
            width: 88%;
            margin: 40px auto;
        }

        h1, h2, h3 {
            letter-spacing: 1px;
        }

        .brand {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #cfcfcf;
            margin-bottom: 30px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .nav {
            display: flex;
            gap: 18px;
            margin-bottom: 30px;
            border-bottom: 1px solid #777;
            padding-bottom: 18px;
        }

        .nav a {
            color: #f5f5f5;
            text-decoration: none;
            border: 1px solid #777;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 700;
        }

        .nav a:hover {
            background: #f5f5f5;
            color: #151515;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 22px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 22px;
        }

        .card {
            border: 1px solid #aaa;
            border-radius: 16px;
            padding: 26px;
            margin-bottom: 22px;
            background: #1d1d1d;
        }

        .metric {
            font-size: 42px;
            font-weight: 800;
            margin: 8px 0;
        }

        .label {
            color: #cfcfcf;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 13px;
            font-weight: 700;
        }

        .status-high {
            color: #ff5757;
            font-weight: 800;
        }

        .status-medium {
            color: #ffcc66;
            font-weight: 800;
        }

        .status-low {
            color: #63d471;
            font-weight: 800;
        }

        .button {
            display: inline-block;
            margin-top: 18px;
            padding: 12px 18px;
            border-radius: 8px;
            background: #f5f5f5;
            color: #151515;
            text-decoration: none;
            font-weight: 800;
        }

        ul {
            line-height: 1.8;
        }

        .statement {
            font-size: 18px;
            line-height: 1.6;
            color: #e8e8e8;
        }

        .small {
            font-size: 13px;
            color: #cfcfcf;
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="brand">VANCE</div>
        <div class="subtitle">Commission-Neutral Performance Concierge</div>

        <div class="nav">
            <a href="/dashboard">Dashboard</a>
            <a href="/away">While You Were Away</a>
            <a href="/items">Items Needing Attention</a>
            <a href="/plans">Prebuilt Action Plans</a>
            <a href="/change">Change Manager</a>
            <a href="/where-your-money-goes">Where Your Money Goes</a>
        </div>

        {% block content %}{% endblock %}
    </div>
</body>
</html>
